<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园生活助手 - 增强验证版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --bg: #f3f4f6; --text: #1f2937; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        header { background: #fff; padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 10px; }
        .nav-group { display: flex; align-items: center; gap: 15px; }
        .search-box { position: relative; flex-grow: 1; max-width: 300px; }
        .search-box input { width: 100%; padding: 8px 35px 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; }
        .search-icon { position: absolute; right: 12px; top: 8px; color: #999; }
        
        nav { display: flex; gap: 5px; }
        .nav-link { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; font-size: 0.9rem; }
        .nav-link.active { background: var(--primary); color: white; }
        
        main { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #eee; display: block; }
        .card-body { padding: 12px; }
        .price { color: var(--danger); font-size: 1.1rem; font-weight: 800; }

        /* 过期标志样式 */
        .expired-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); border: 4px solid var(--danger); color: var(--danger); padding: 10px 20px; font-size: 2rem; font-weight: 900; background: rgba(255,255,255,0.9); border-radius: 10px; z-index: 5; pointer-events: none; opacity: 0.9; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.open { display: flex; }
        .modal-content { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 16px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #999; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; border-radius: 50%; z-index: 10; }

        .detail-gallery { display: flex; overflow-x: auto; gap: 10px; margin: 15px 0; padding-bottom: 10px; }
        .detail-gallery img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; cursor: zoom-in; flex-shrink: 0; background: #f9f9f9; }
        
        #imgViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        #imgViewer img { max-width: 95%; max-height: 95%; object-fit: contain; }

        .del-btn { background: #fee2e2; color: var(--danger); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-top: 20px; width: 100%; font-weight: bold; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; }
        label { font-size: 0.85rem; color: #666; font-weight: bold; }

        .preview-grid { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
        .preview-item { position: relative; width: 60px; height: 60px; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .tip-box { font-size: 11px; color: #f59e0b; background: #fffbeb; padding: 8px; border-radius: 6px; margin-top: 5px; border: 1px solid #fef3c7; }

        .admin-entry { margin-top: 30px; padding-top: 20px; border-top: 1px dashed #eee; }
        .admin-entry p { font-size: 12px; color: #bbb; cursor: pointer; }
        #adminBox { display: none; margin-top: 10px; }
        .ip-tip { font-size: 12px; padding: 10px; border-radius: 6px; margin-bottom: 15px; min-height: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; line-height: 1.5; }
        .ip-success { background: #f0fdf4; color: #166534; border: 1px solid #bcf0da; }
        .ip-fail { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .retry-link { color: #4f46e5; text-decoration: underline; cursor: pointer; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <div class="logo" onclick="location.reload()" style="cursor:pointer; font-weight:bold; font-size:1.2rem;">🏫 校园助手</div>
            <nav>
                <div class="nav-link active" id="nav-market" onclick="switchSection('market')">二手</div>
                <div class="nav-link" id="nav-carpool" onclick="switchSection('carpool')">拼车</div>
                <div class="nav-link" id="nav-jobs" onclick="switchSection('jobs')">兼职</div>
            </nav>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索关键词..." oninput="handleSearch()">
            <span class="search-icon">🔍</span>
        </div>
        
        <button id="loginBtn" onclick="openAuthModal()" style="border:none; background:#eee; padding:8px 15px; border-radius:20px; font-size:12px; cursor:pointer; font-weight:bold;">建立云连接</button>
    </header>

    <main>
        <section id="marketSection" class="content-section active">
            <div class="section-header"><h3>二手集市</h3><button class="btn-main" onclick="openModal('pubMarket')">+ 发布商品</button></div>
            <div class="data-grid" id="marketList"></div>
        </section>

        <section id="carpoolSection" class="content-section">
            <div class="section-header"><h3>拼车计划</h3><button class="btn-main" onclick="openModal('pubCarpool')">+ 发布行程</button></div>
            <div class="data-grid" id="carpoolList"></div>
        </section>

        <section id="jobsSection" class="content-section">
            <div class="section-header"><h3>兼职招聘</h3><button class="btn-main" onclick="openModal('pubJob')">+ 发布岗位</button></div>
            <div class="data-grid" id="jobsList"></div>
        </section>
    </main>

    <div id="imgViewer" onclick="this.style.display='none'"><img id="viewedImg" src=""></div>
    <div id="authModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <div class="close-btn" onclick="closeModal()">×</div>
            <h3 style="margin-bottom: 10px;">身份验证</h3>
            <div id="ipStatus" class="ip-tip">正在检测接入环境...</div>
            <div id="loginFormArea">
                <p style="font-size: 12px; color: #666; margin-bottom: 20px;">首次登录后，三个月内免重复验证</p>
                <div id="emailBox" style="display: none;">
                    <input type="email" id="emailInput" placeholder="输入邮箱获取验证码" style="text-align:center;">
                    <button class="btn-main" id="sendEmailBtn" onclick="handleEmailLogin()" style="width:100%; margin-top:15px;">发送验证码</button>
                </div>
                <div id="verifyArea" style="display: none; margin-top: 15px; background: #f9fafb; padding: 15px; border-radius: 8px;">
                    <label style="display: block; text-align: left; margin-bottom: 5px;">请输入邮箱收到的验证码：</label>
                    <input type="text" id="codeInput" placeholder="输入数字" style="text-align:center; letter-spacing: 5px; font-size: 1.2rem; font-weight: bold;">
                    <button class="btn-main" onclick="handleVerifyCode()" style="width:100%; margin-top:10px; background: var(--secondary);">确认并在本页登录</button>
                </div>
                <p id="ipNotice" style="font-size: 11px; color: #999; margin-top: 15px;">提示：若无法识别校园网，请尝试切换WiFi或联系管理员。</p>
            </div>
            <div id="userInfoArea" style="display: none;">
                <p style="margin-bottom: 20px; font-size: 14px;">当前登录账号：<br><strong id="displayUserEmail" style="color: var(--primary); font-size: 16px;"></strong></p>
                <button class="del-btn" onclick="handleLogout()" style="margin-top: 0;">退出登录</button>
            </div>
            <div class="admin-entry">
                <p onclick="document.getElementById('adminBox').style.display='block'">⊙ 管理员调试入口</p>
                <div id="adminBox">
                    <input type="password" id="adminPwd" maxlength="6" placeholder="输入6位调试码" style="text-align:center; font-size:14px; padding:8px;">
                    <button onclick="adminLogin()" style="background:#666; color:white; border:none; padding:8px 15px; border-radius:5px; width:100%; cursor:pointer;">验证并直接登录</button>
                </div>
            </div>
        </div>
    </div>
    <div id="detailModal" class="modal"><div class="modal-content"><div class="close-btn" onclick="closeModal()">×</div><div id="detailContent"></div></div></div>
    
    <div id="pubMarket" class="modal"><div class="modal-content"><div class="close-btn" onclick="closeModal()">×</div><h3>发布二手商品</h3><input type="text" id="m_t" placeholder="商品名称"><input type="number" id="m_p" placeholder="价格 (¥)"><input type="text" id="m_c" placeholder="联系微信号"><label>上传图片：</label><div style="color:var(--primary); font-size:12px; font-weight:bold; margin-bottom:5px;">💡 建议最后一张图片上传为支付码以方便支付</div><input type="file" multiple accept="image/*" onchange="handleImgs(this, 'pre_m', 'store_m')"><div class="preview-grid" id="pre_m"></div><button class="btn-main" style="width:100%; margin-top:10px" onclick="submit('Market')">确认发布</button></div></div>
    
    <div id="pubCarpool" class="modal"><div class="modal-content"><div class="close-btn" onclick="closeModal()">×</div><h3>发布拼车行程</h3><input type="text" id="c_t" placeholder="出发地 - 目的地"><input type="text" id="c_time" placeholder="出发时间"><input type="text" id="c_c" placeholder="联系方式"><label>行程图：</label><input type="file" multiple accept="image/*" onchange="handleImgs(this, 'pre_c', 'store_c')"><div class="preview-grid" id="pre_c"></div><button class="btn-main" style="width:100%; margin-top:10px" onclick="submit('Carpool')">确认发布</button></div></div>
    <div id="pubJob" class="modal"><div class="modal-content"><div class="close-btn" onclick="closeModal()">×</div><h3>发布兼职招聘</h3><input type="text" id="j_t" placeholder="岗位名称"><input type="text" id="j_p" placeholder="薪资"><textarea id="j_d" placeholder="要求" rows="4"></textarea><input type="text" id="j_c" placeholder="联系方式"><label>海报图：</label><input type="file" multiple accept="image/*" onchange="handleImgs(this, 'pre_j', 'store_j')"><div class="preview-grid" id="pre_j"></div><button class="btn-main" style="width:100%; margin-top:10px" onclick="submit('Job')">确认发布</button></div></div>

    <script>
        const SUPABASE_URL = 'https://xhcqqnpzyafvjsxyndya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_gsBzkYayDH3Z3jbEENOLrA__a7tf2TA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        let isLogin = false;
        let isAdmin = false; 
        let globalData = { Market: [], Carpool: [], Job: [] };
        let localFiles = { store_m: [], store_c: [], store_j: [] };
        const PLACEHOLDER = 'https://via.placeholder.com/300x180?text=No+Image';

        function isIPInRange(ip) { 
            if(!ip || typeof ip !== 'string') return false; 
            if (ip.includes(':')) return ip.toLowerCase().startsWith('240c:ca0d');
            const parts = ip.split('.');
            if(parts.length !== 4) return false;
            const p = parts.map(Number);
            if (p[0] === 210 && p[1] === 44 && (p[2] === 94 || p[2] === 95)) return true;
            if (p[0] === 112 && p[1] === 253) return true;
            return false; 
        }
        
        // --- 【极速网络检测核心】：使用并发请求，彻底解决手机端点击卡顿问题 ---
        async function getIP() { 
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000); // 2秒极限超时
            
            try {
                // 并发请求，腾讯接口国内访问通常小于100ms，谁先返回就用谁
                const fetchQQ = fetch('https://vv.video.qq.com/checktime?otype=json', { signal: controller.signal })
                    .then(r => r.text())
                    .then(text => {
                        const match = text.match(/"ip":"([^"]+)"/);
                        if (match) return match[1];
                        throw new Error('Not found');
                    });
                const fetchIpify = fetch('https://api.ipify.org?format=json', { signal: controller.signal })
                    .then(r => r.json())
                    .then(d => d.ip || Promise.reject());
                const fetchIdent = fetch('https://v4.ident.me/.json', { signal: controller.signal })
                    .then(r => r.json())
                    .then(d => d.address || Promise.reject());

                const ip = await Promise.any([fetchQQ, fetchIpify, fetchIdent]);
                clearTimeout(timeoutId);
                return ip;
            } catch (e) {
                return null; 
            }
        }

        // --- 实时环境守卫：每次点击关键按钮时进行极速二次校验 ---
        async function checkEnvironment() {
            const userIP = await getIP();
            if (!isIPInRange(userIP) && !isAdmin) {
                alert("⚠️ 网络环境异常：\n检测到您当前未连接校园网（可能在使用流量）。\n为保障校园信息安全，请重新连接校园WiFi后再查看详情或发布！");
                openAuthModal();
                return false;
            }
            return true;
        }

        // 行程发布过期一天（24小时）后再判定过期并自动删除
        function isCarpoolExpired(timeStr) {
            if (!timeStr) return false;
            try {
                const cleanStr = timeStr.replace('月', '-').replace('日', '').trim();
                let postTime = new Date(cleanStr);
                if (isNaN(postTime.getTime())) {
                    const today = new Date().toLocaleDateString();
                    postTime = new Date(today + " " + timeStr);
                }
                if (isNaN(postTime.getTime())) return false;
                
                // 过期时间 = 设定的出发时间 + 24小时 (86400000毫秒)
                const expireTime = postTime.getTime() + 86400000;
                return new Date().getTime() > expireTime;
            } catch(e) { return false; }
        }
        
        async function openAuthModal() {
            openModal('authModal', true); 
            const statusBox = document.getElementById('ipStatus');
            const emailBox = document.getElementById('emailBox');
            const loginArea = document.getElementById('loginFormArea');
            const userArea = document.getElementById('userInfoArea');
            
            emailBox.style.display = 'none'; 
            statusBox.className = "ip-tip";
            statusBox.innerHTML = "⏳ 正在同步校园网准入状态...";
            
            const userIP = await getIP();
            if (isIPInRange(userIP)) {
                statusBox.innerHTML = `✅ 认证成功！<br>当前校园网接入: ${userIP}`;
                statusBox.className = "ip-tip ip-success";
                if(!isLogin) {
                    emailBox.style.display = 'block'; 
                    loginArea.style.display = 'block';
                    userArea.style.display = 'none';
                } else {
                    loginArea.style.display = 'none';
                    userArea.style.display = 'block';
                }
            } else {
                statusBox.innerHTML = `🚫 接入受限：必须使用校园网环境<br><span style="font-size:10px; color:#999">(识别到IP: ${userIP || '获取失败'})</span><br><div class="retry-link" onclick="openAuthModal()">点击重试检测</div>`;
                statusBox.className = "ip-tip ip-fail";
                emailBox.style.display = 'none'; 
                loginArea.style.display = 'block';
                userArea.style.display = 'none';
            }
        }

        async function showDetail(type, index) {
            if (!isLogin) { alert("🔐 请先建立云连接验证身份。"); openAuthModal(); return; }
            
            // 【核心防绕过】：就算登录了，用流量点卡片也会被弹回去
            const envOk = await checkEnvironment();
            if (!envOk) return;

            const item = globalData[type][index];
            const content = document.getElementById('detailContent');
            const myPosts = JSON.parse(localStorage.getItem('my_posts') || '[]');
            const isOwner = myPosts.includes(item.id);
            const canDelete = isOwner || isAdmin; 
            const images = Array.isArray(item.images) ? item.images : [];
            content.innerHTML = `
                <div class="detail-gallery">
                    ${images.map(u => `<img src="${u}" onclick="viewImage('${u}')" onerror="this.src='${PLACEHOLDER}'">`).join('')}
                </div>
                <div style="padding:10px 0">
                    <h2 style="color:var(--primary)">${item.name || item.route || item.title}</h2>
                    <div style="background:#f9fafb; padding:15px; border-radius:12px; margin:15px 0">
                        <p><b>📱 联系方式：</b>${item.contact}</p>
                        ${item.price ? `<p><b>💰 价格：</b><span class="price">¥${item.price}</span></p>` : ''}
                        ${item.time ? `<p><b>⏰ 时间：</b>${item.time}</p>` : ''}
                        ${item.pay ? `<p><b>💎 待遇：</b>${item.pay}</p>` : ''}
                    </div>
                    ${item.desc ? `<p style="white-space:pre-wrap;">${item.desc}</p>` : ''}
                </div>
                ${canDelete ? `<button class="del-btn" onclick="deletePost('${item.id}', '${type}')">🗑️ 删除发布 (仅作者可见)</button>` : ''}
            `;
            openModal('detailModal', true);
        }

        async function submit(type) {
            if(!isLogin) return alert("请先验证身份！");
            
            // 【核心防绕过】：点击发布按钮时，强制校验IP环境
            const envOk = await checkEnvironment();
            if (!envOk) return;

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "正在发布..."; btn.disabled = true;
            try {
                let key = type === 'Market' ? 'store_m' : (type === 'Carpool' ? 'store_c' : 'store_j');
                const imgUrls = [];
                for(let f of localFiles[key]) {
                    const fname = `public/${Date.now()}_${f.name.replace(/[^\x00-\x7F]/g, "")}`;
                    await _supabase.storage.from('images').upload(fname, f);
                    imgUrls.push(_supabase.storage.from('images').getPublicUrl(fname).data.publicUrl);
                }
                const payload = { images: imgUrls, contact: document.getElementById(type[0].toLowerCase()+'_c').value };
                if(type === 'Market') { payload.name = document.getElementById('m_t').value; payload.price = document.getElementById('m_p').value; }
                else if(type === 'Carpool') { payload.route = document.getElementById('c_t').value; payload.time = document.getElementById('c_time').value; }
                else if(type === 'Job') { payload.title = document.getElementById('j_t').value; payload.pay = document.getElementById('j_p').value; payload.desc = document.getElementById('j_d').value; }
                const { data, error } = await _supabase.from(type).insert([payload]).select();
                if(error) throw error;
                const myPosts = JSON.parse(localStorage.getItem('my_posts') || '[]');
                myPosts.push(data[0].id);
                localStorage.setItem('my_posts', JSON.stringify(myPosts));
                alert("发布成功！");
                closeModal(); load();
                btn.disabled = false; btn.innerText = originalText;
                document.querySelectorAll('.modal-content input, .modal-content textarea').forEach(i => i.value = '');
                document.querySelectorAll('.preview-grid').forEach(g => g.innerHTML = '');
                localFiles = { store_m: [], store_c: [], store_j: [] };
            } catch (e) { alert("发布失败: " + e.message); btn.disabled = false; btn.innerText = originalText; }
        }

        function adminLogin() {
            if (document.getElementById('adminPwd').value === "051218") {
                isAdmin = true;
                updateLoginState(true, "Administrator_Debug");
                closeModal();
            } else { alert("调试码错误"); }
        }

        function handleImgs(input, preId, key) {
            Array.from(input.files).forEach(f => {
                localFiles[key].push(f);
                const imgUrl = URL.createObjectURL(f);
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${imgUrl}"><div style="position:absolute;top:-5px;right:-5px;background:var(--danger);color:white;width:18px;height:18px;border-radius:50%;text-align:center;cursor:pointer;">×</div>`;
                div.onclick = () => { div.remove(); localFiles[key] = localFiles[key].filter(file => file !== f); };
                document.getElementById(preId).appendChild(div);
            });
            input.value = '';
        }

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) updateLoginState(true, session.user.email);
            _supabase.auth.onAuthStateChange((event, session) => {
                if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session) { updateLoginState(true, session.user.email); }
                else if (event === 'SIGNED_OUT') { updateLoginState(false, null); }
            });
        }

        function updateLoginState(loggedIn, email) {
            isLogin = loggedIn;
            const btn = document.getElementById('loginBtn');
            btn.innerText = loggedIn ? "✅ 已连接" : "建立云连接";
            btn.style.background = loggedIn ? "#dcfce7" : "#eee";
            document.getElementById('loginFormArea').style.display = loggedIn ? 'none' : 'block';
            document.getElementById('userInfoArea').style.display = loggedIn ? 'block' : 'none';
            if(email) document.getElementById('displayUserEmail').innerText = email;
        }

        async function deletePost(id, type) {
            if (!confirm("确定要永久删除这条发布吗？此操作不可撤销。")) return;
            try {
                const { data: item } = await _supabase.from(type).select('images').eq('id', id).single();
                if (item && item.images && item.images.length > 0) {
                    const paths = item.images.map(url => {
                        const parts = url.split('/storage/v1/object/public/images/');
                        return parts.length > 1 ? parts[1] : null;
                    }).filter(p => p !== null);
                    if (paths.length > 0) await _supabase.storage.from('images').remove(paths);
                }
                const { error } = await _supabase.from(type).delete().eq('id', id);
                if (error) throw error;
                let myPosts = JSON.parse(localStorage.getItem('my_posts') || '[]');
                myPosts = myPosts.filter(pId => String(pId) !== String(id));
                localStorage.setItem('my_posts', JSON.stringify(myPosts));
                alert("删除成功！"); closeModal(); load();
            } catch (e) { console.log("Delete error:", e); }
        }

        async function load() {
            const { data: m } = await _supabase.from('Market').select('*').order('created_at', {ascending:false});
            const { data: c } = await _supabase.from('Carpool').select('*').order('created_at', {ascending:false});
            const { data: j } = await _supabase.from('Job').select('*').order('created_at', {ascending:false});
            
            // 只要一加载，遇到过期超过1天的记录直接执行清除
            if(c) {
                for (let item of c) {
                    if(isCarpoolExpired(item.time)) {
                        _supabase.from('Carpool').delete().eq('id', item.id).then(()=>{});
                    }
                }
            }

            globalData = { Market: m||[], Carpool: c||[], Job: j||[] };
            render('marketList', globalData.Market, 'Market');
            render('carpoolList', globalData.Carpool, 'Carpool');
            render('jobsList', globalData.Job, 'Job');
        }

        function render(id, list, type) {
            const container = document.getElementById(id);
            container.innerHTML = list.map((item, index) => {
                const expired = type === 'Carpool' && isCarpoolExpired(item.time);
                return `
                <div class="card" onclick="showDetail('${type}', ${index})">
                    ${expired ? '<div class="expired-badge">已过期</div>' : ''}
                    <img src="${(item.images && item.images[0]) || PLACEHOLDER}" class="card-img" style="${expired ? 'filter:grayscale(1) opacity(0.5);' : ''}" onerror="this.src='${PLACEHOLDER}'">
                    <div class="card-body">
                        ${type==='Market' ? `<div class="price">¥${item.price}</div><h4>${item.name}</h4>` : ''}
                        ${type==='Carpool' ? `<h4>${item.route}</h4><p>⏰ ${item.time}</p>` : ''}
                        ${type==='Job' ? `<div style="color:var(--secondary);font-weight:bold">${item.pay}</div><h4>${item.title}</h4>` : ''}
                    </div>
                </div>
            `}).join('');
        }

        async function handleEmailLogin() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email.includes('@')) return alert("格式不正确");
            const { error } = await _supabase.auth.signInWithOtp({ email });
            if (error) alert(error.message); else { document.getElementById('verifyArea').style.display = 'block'; alert("验证码已发送！"); }
        }
        async function handleVerifyCode() {
            const email = document.getElementById('emailInput').value.trim();
            const token = document.getElementById('codeInput').value.trim();
            const { error } = await _supabase.auth.verifyOtp({ email, token, type: 'email' });
            if (error) alert("验证码错误"); else { closeModal(); }
        }
        async function handleLogout() { if(confirm("确定退出登录吗？")) { isAdmin = false; await _supabase.auth.signOut(); location.reload(); } }
        function handleSearch() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const tab = document.querySelector('.nav-link.active').id.split('-')[1];
            const type = tab === 'market' ? 'Market' : (tab === 'carpool' ? 'Carpool' : 'Job');
            const filtered = globalData[type].filter(i => (i.name||i.route||i.title||"").toLowerCase().includes(keyword));
            render(tab + 'List', filtered, type);
        }
        function viewImage(url) { document.getElementById('viewedImg').src = url; document.getElementById('imgViewer').style.display = 'flex'; }
        function switchSection(id) {
            document.querySelectorAll('.content-section, .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(id + 'Section').classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }
        
        async function openModal(id, skipCheck = false) { 
            if (!skipCheck && id !== 'authModal') {
                const envOk = await checkEnvironment();
                if (!envOk) return;
            }
            document.getElementById(id).classList.add('open'); 
        }

        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }
        
        window.onload = async () => { 
            await checkSession(); 
            // 首次进入只默默拉取数据，让用户自由滚动主页面，不强制阻断
            await load(); 
        };
    </script>
</body>
</html>
