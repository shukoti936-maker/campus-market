<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园生活助手 - 物理网段验证版</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --bg: #f3f4f6; --text: #1f2937; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }
        
        header { background: #fff; padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 10px; }
        .nav-group { display: flex; align-items: center; gap: 15px; }
        .search-box { position: relative; flex-grow: 1; max-width: 300px; }
        .search-box input { width: 100%; padding: 8px 35px 8px 15px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 0.9rem; }
        .search-icon { position: absolute; right: 12px; top: 8px; color: #999; }
        
        nav { display: flex; gap: 5px; }
        .nav-link { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #666; transition: 0.3s; font-size: 0.9rem; }
        .nav-link.active { background: var(--primary); color: white; }
        
        main { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-main { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }
        
        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.2s; position: relative; }
        .card:hover { transform: translateY(-3px); }
        .card-img { width: 100%; height: 180px; object-fit: cover; background: #eee; display: block; }
        .card-body { padding: 12px; }
        .price { color: var(--danger); font-size: 1.1rem; font-weight: 800; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.open { display: flex; }
        .modal-content { background: white; width: 95%; max-width: 500px; padding: 25px; border-radius: 16px; max-height: 85vh; overflow-y: auto; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #999; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: #f0f0f0; border-radius: 50%; z-index: 10; }

        /* IP 验证增强样式 */
        .ip-monitor { background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
        .ip-tag { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-top: 8px; }
        .tag-ok { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .tag-fail { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .detail-gallery { display: flex; overflow-x: auto; gap: 10px; margin: 15px 0; padding-bottom: 10px; }
        .detail-gallery img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; cursor: zoom-in; flex-shrink: 0; background: #f9f9f9; }
        
        #imgViewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        #imgViewer img { max-width: 95%; max-height: 95%; object-fit: contain; }

        .del-btn { background: #fee2e2; color: var(--danger); border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; margin-top: 20px; width: 100%; font-weight: bold; }
        
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; }
        label { font-size: 0.85rem; color: #666; font-weight: bold; }

        .preview-grid { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
        .preview-item { position: relative; width: 60px; height: 60px; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-group">
            <div class="logo" onclick="location.reload()" style="cursor:pointer; font-weight:bold; font-size:1.2rem;">🏫 校园助手</div>
            <nav>
                <div class="nav-link active" id="nav-market" onclick="switchSection('market')">二手</div>
                <div class="nav-link" id="nav-carpool" onclick="switchSection('carpool')">拼车</div>
                <div class="nav-link" id="nav-jobs" onclick="switchSection('jobs')">兼职</div>
            </nav>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索关键词..." oninput="handleSearch()">
            <span class="search-icon">🔍</span>
        </div>
        
        <button id="loginBtn" onclick="openAuthModal()" style="border:none; background:#eee; padding:8px 15px; border-radius:20px; font-size:12px; cursor:pointer; font-weight:bold;">建立云连接</button>
    </header>

    <main>
        <section id="marketSection" class="content-section active">
            <div class="section-header"><h3>二手集市</h3><button class="btn-main" onclick="openModal('pubMarket')">+ 发布商品</button></div>
            <div class="data-grid" id="marketList"></div>
        </section>

        <section id="carpoolSection" class="content-section">
            <div class="section-header"><h3>拼车计划</h3><button class="btn-main" onclick="openModal('pubCarpool')">+ 发布行程</button></div>
            <div class="data-grid" id="carpoolList"></div>
        </section>

        <section id="jobsSection" class="content-section">
            <div class="section-header"><h3>兼职招聘</h3><button class="btn-main" onclick="openModal('pubJob')">+ 发布岗位</button></div>
            <div class="data-grid" id="jobsList"></div>
        </section>
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content" style="text-align:center;">
            <div class="close-btn" onclick="closeModal()">×</div>
            <h3 style="margin-bottom: 15px;">身份与校园网验证</h3>
            
            <div class="ip-monitor" id="ipStatusBox">
                <div style="font-size: 14px; color: #444;">系统检测到您的出口IP：</div>
                <div id="currentIP" style="font-family: monospace; font-weight: bold; font-size: 18px; margin: 5px 0; color: var(--primary);">正在检测...</div>
                <div id="netTag">⏳ 正在同步网关数据...</div>
            </div>

            <div id="loginFormArea">
                <input type="email" id="emailInput" placeholder="请输入您的邮箱" style="text-align:center;">
                <button class="btn-main" id="sendEmailBtn" onclick="handleEmailLogin()" style="width:100%; margin-top:15px;" disabled>正在验证网络环境...</button>
                
                <div id="verifyArea" style="display: none; margin-top: 15px; background: #f9fafb; padding: 15px; border-radius: 8px;">
                    <label style="display: block; text-align: left; margin-bottom: 5px;">请输入邮箱收到的验证码：</label>
                    <input type="text" id="codeInput" placeholder="6位数字" style="text-align:center; letter-spacing: 5px; font-size: 1.2rem; font-weight: bold;">
                    <button class="btn-main" onclick="handleVerifyCode()" style="width:100%; margin-top:10px; background: var(--secondary);">确认并登录</button>
                </div>
                <p id="ipHint" style="font-size: 11px; color: #ef4444; margin-top: 15px; font-weight: bold;">⚠️ 访问受限：本系统仅限山东第二医科大学校内网络用户使用</p>
            </div>

            <div id="userInfoArea" style="display: none;">
                <p style="margin-bottom: 20px; font-size: 14px;">当前登录账号：<br><strong id="displayUserEmail" style="color: var(--primary); font-size: 16px;"></strong></p>
                <button class="del-btn" onclick="handleLogout()" style="margin-top: 0;">退出登录</button>
            </div>
        </div>
    </div>

    <div id="imgViewer" onclick="this.style.display='none'"><img id="viewedImg" src=""></div>
    <div id="detailModal" class="modal"><div class="modal-content"><div class="close-btn" onclick="closeModal()">×</div><div id="detailContent"></div></div></div>
    
    <div id="pubMarket" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">×</div>
            <h3>发布二手商品</h3>
            <input type="text" id="m_t" placeholder="商品名称">
            <input type="number" id="m_p" placeholder="价格 (¥)">
            <input type="text" id="m_c" placeholder="联系微信号">
            
            <label>上传个人收款码（用于快速交易）：</label>
            <input type="file" accept="image/*" onchange="handleImgs(this, 'pre_qr', 'store_qr')">
            <div class="preview-grid" id="pre_qr"></div>
            
            <label>上传实物图（多选）：</label>
            <input type="file" multiple accept="image/*" onchange="handleImgs(this, 'pre_m', 'store_m')">
            <div class="preview-grid" id="pre_m"></div>
            
            <button class="btn-main" style="width:100%; margin-top:10px" onclick="submit('Market')">确认发布</button>
        </div>
    </div>

    <div id="pubCarpool" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">×</div>
            <h3>发布拼车行程</h3>
            <input type="text" id="c_t" placeholder="出发地 - 目的地">
            <input type="text" id="c_time" placeholder="出发时间（如：明日下午2点）">
            <input type="text" id="c_c" placeholder="联系微信号/手机号">
            <label>行程相关图：</label>
            <input type="file" multiple accept="image/*" onchange="handleImgs(this, 'pre_c', 'store_c')">
            <div class="preview-grid" id="pre_c"></div>
            <button class="btn-main" style="width:100%; margin-top:10px" onclick="submit('Carpool')">确认发布</button>
        </div>
    </div>

    <div id="pubJob" class="modal">
        <div class="modal-content">
            <div class="close-btn" onclick="closeModal()">×</div>
            <h3>发布兼职招聘</h3>
            <input type="text" id="j_t" placeholder="岗位名称">
            <input type="text" id="j_p" placeholder="薪资/待遇（如：200/天）">
            <textarea id="j_d" placeholder="工作内容及要求" rows="4"></textarea>
            <input type="text" id="j_c" placeholder="联系人及联系方式">
            <label>海报/环境图：</label>
            <input type="file" multiple accept="image/*" onchange="handleImgs(this, 'pre_j', 'store_j')">
            <div class="preview-grid" id="pre_j"></div>
            <button class="btn-main" style="width:100%; margin-top:10px" onclick="submit('Job')">确认发布</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xhcqqnpzyafvjsxyndya.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_gsBzkYayDH3Z3jbEENOLrA__a7tf2TA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const ADMIN_BYPASS = true; 

        let isLogin = false;
        let isIpAllowed = false; 
        let globalData = { Market: [], Carpool: [], Job: [] };
        // 增加 store_qr 存储收款码文件
        let localFiles = { store_m: [], store_qr: [], store_c: [], store_j: [] };
        const PLACEHOLDER = 'https://via.placeholder.com/300x180?text=No+Image';

        function ipToLong(ip) {
            if (!ip || ip === "未知") return 0;
            var d = ip.split('.');
            if (d.length !== 4) return 0;
            return ((((((+d[0])*256)+(+d[1]))*256)+(+d[2]))*256)+(+d[3]);
        }

        async function verifyDeviceIP() {
            const ipEl = document.getElementById('currentIP');
            const tagEl = document.getElementById('netTag');
            const loginBtn = document.getElementById('sendEmailBtn');
            const hintEl = document.getElementById('ipHint');
            const boxEl = document.getElementById('ipStatusBox');

            try {
                const script = document.createElement('script');
                script.src = "https://pv.sohu.com/cityjson?ie=utf-8";
                document.body.appendChild(script);

                await new Promise((resolve, reject) => {
                    script.onload = resolve;
                    script.onerror = reject;
                    setTimeout(() => reject(new Error("Timeout")), 8000); 
                });

                const userIP = window.returnCitySN ? window.returnCitySN["cip"] : "未知";
                ipEl.innerText = userIP;

                const internalStart = ipToLong("172.22.0.1");
                const internalEnd = ipToLong("172.22.255.254");
                const publicStart = ipToLong("112.253.0.0");
                const publicEnd = ipToLong("112.253.255.255");
                const current = ipToLong(userIP);

                const isInternal = (current >= internalStart && current <= internalEnd) || (userIP && userIP.startsWith("172."));
                const isPublicSchoolNet = (current >= publicStart && current <= publicEnd) || (userIP && userIP.startsWith("112.253."));

                if (isInternal || isPublicSchoolNet || ADMIN_BYPASS) {
                    isIpAllowed = true;
                    if (ADMIN_BYPASS && !(isInternal || isPublicSchoolNet)) {
                        tagEl.innerHTML = '<span class="ip-tag tag-ok" style="background:#fef9c3; color:#854d0e; border:1px solid #fde047;">🛠️ 管理员调试模式：校外强制授权</span>';
                    } else {
                        tagEl.innerHTML = '<span class="ip-tag tag-ok">✅ 校验通过：已锁定校内物理位置</span>';
                    }
                    loginBtn.disabled = false;
                    loginBtn.innerText = "获取邮箱验证码";
                    hintEl.style.display = 'none';
                    boxEl.style.borderColor = "#10b981";
                } else {
                    isIpAllowed = false;
                    tagEl.innerHTML = '<span class="ip-tag tag-fail">❌ 校验失败：非指定校内网段</span>';
                    loginBtn.disabled = true;
                    loginBtn.innerText = "登录受限(非校园网)";
                    hintEl.style.display = 'block';
                    boxEl.style.borderColor = "#ef4444";
                }
                
                if (script.parentNode) script.parentNode.removeChild(script);
            } catch (e) {
                console.error("IP验证异常:", e);
                if (ADMIN_BYPASS) {
                    isIpAllowed = true;
                    ipEl.innerText = "调试模式已激活";
                    tagEl.innerHTML = '<span class="ip-tag tag-ok" style="background:#fef9c3; color:#854d0e; border:1px solid #fde047;">⚠️ 网关连接失败，但已强制授权</span>';
                    loginBtn.disabled = false;
                    loginBtn.innerText = "获取邮箱验证码";
                    hintEl.style.display = 'none';
                } else {
                    ipEl.innerText = "网关验证超时";
                    tagEl.innerText = "请确认连接学校 Wi-Fi 后再次尝试";
                    isIpAllowed = false;
                }
            }
        }

        async function openAuthModal() {
            openModal('authModal');
            if (!isLogin) {
                await verifyDeviceIP(); 
            }
        }

        async function handleEmailLogin() {
            if (!isIpAllowed) {
                alert("安全警告：您的网络环境不在校内授权范围内，无法继续操作！");
                return;
            }
            const email = document.getElementById('emailInput').value.trim();
            const btn = document.getElementById('sendEmailBtn');
            if (!email || !email.includes('@')) return alert("请输入正确的邮箱地址");
            btn.disabled = true;
            let timer = 60;
            const interval = setInterval(() => {
                btn.innerText = `重新获取(${timer}s)`;
                if (timer <= 0) { clearInterval(interval); btn.disabled = false; btn.innerText = "获取验证码"; }
                timer--;
            }, 1000);
            const { error } = await _supabase.auth.signInWithOtp({ email });
            if (error) {
                alert("发送失败: " + error.message);
                clearInterval(interval);
                btn.disabled = false;
            } else {
                document.getElementById('verifyArea').style.display = 'block';
                alert("验证码已发送至您的邮箱！");
            }
        }

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            updateLoginState(!!session, session?.user?.email);
            _supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'SIGNED_IN') { updateLoginState(true, session.user.email); closeModal(); }
                else if (event === 'SIGNED_OUT') { updateLoginState(false, null); }
            });
        }

        function updateLoginState(loggedIn, email) {
            isLogin = loggedIn;
            const btn = document.getElementById('loginBtn');
            if (loggedIn) {
                btn.innerText = "✅ 已连接云端"; btn.style.background = "#dcfce7";
                document.getElementById('loginFormArea').style.display = 'none';
                document.getElementById('userInfoArea').style.display = 'block';
                document.getElementById('displayUserEmail').innerText = email;
            } else {
                btn.innerText = "建立云连接"; btn.style.background = "#eee";
                document.getElementById('loginFormArea').style.display = 'block';
                document.getElementById('userInfoArea').style.display = 'none';
            }
        }

        async function handleVerifyCode() {
            const email = document.getElementById('emailInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            const { error } = await _supabase.auth.verifyOtp({ email, token: code, type: 'magiclink' });
            if (error) alert("验证码无效或已过期: " + error.message);
            else alert("✅ 身份验证成功！");
        }

        async function handleLogout() {
            if(confirm("确定断开云端连接并退出？")) { await _supabase.auth.signOut(); location.reload(); }
        }

        function handleSearch() {
            const kw = document.getElementById('searchInput').value.toLowerCase();
            const tab = document.querySelector('.nav-link.active').id.split('-')[1];
            const type = tab === 'market' ? 'Market' : (tab === 'carpool' ? 'Carpool' : 'Job');
            const filtered = globalData[type].filter(i => (i.name||i.route||i.title||"").toLowerCase().includes(kw));
            render(tab + 'List', filtered, type);
        }

        function showDetail(type, index) {
            if (!isLogin) { alert("🔐 查看联系方式需要先建立校内云连接"); openAuthModal(); return; }
            const item = globalData[type][index];
            const myPosts = JSON.parse(localStorage.getItem('my_posts') || '[]');
            const isMyPost = myPosts.includes(item.id);
            const imgs = item.images || [];
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-gallery">${imgs.map(u => `<img src="${u}" onclick="viewImage('${u}')">`).join('')}</div>
                <div style="padding:10px 0">
                    <h2 style="color:var(--primary)">${item.name || item.route || item.title}</h2>
                    <div style="background:#f9fafb; padding:15px; border-radius:12px; margin:15px 0">
                        <p><b>📱 联系方式：</b>${item.contact}</p>
                        ${item.price ? `<p><b>💰 意向价格：</b><span class="price">¥${item.price}</span></p>` : ''}
                        
                        ${item.qr_url ? `
                            <div style="margin-top:10px; padding:10px; background:#fff; border:1px dashed #ddd; border-radius:8px; text-align:center;">
                                <p style="font-size:12px; color:#666; margin-bottom:5px;">卖家收款码 (点击放大)</p>
                                <img src="${item.qr_url}" style="width:120px; height:120px; object-fit:contain;" onclick="viewImage('${item.qr_url}')">
                            </div>
                        ` : ''}

                        ${item.time ? `<p><b>⏰ 行程时间：</b>${item.time}</p>` : ''}
                        ${item.pay ? `<p><b>💎 岗位待遇：</b>${item.pay}</p>` : ''}
                    </div>
                    ${item.desc ? `<p style="white-space:pre-wrap; border-left:4px solid #ddd; padding-left:10px">${item.desc}</p>` : ''}
                </div>
                ${isMyPost ? `<button class="del-btn" onclick="deletePost('${item.id}', '${type}')">🗑️ 删除发布</button>` : ''}
            `;
            openModal('detailModal');
        }

        async function deletePost(id, type) {
            if(confirm("确定永久删除此条发布吗？")) {
                await _supabase.from(type).delete().eq('id', id);
                alert("已成功删除"); location.reload();
            }
        }

        async function submit(type) {
            if(!isLogin) return alert("请先通过校内身份验证！");
            const btn = event.target;
            btn.disabled = true; btn.innerText = "发布中...";
            try {
                let key = type === 'Market' ? 'store_m' : (type === 'Carpool' ? 'store_c' : 'store_j');
                const imgUrls = [];
                for(let f of localFiles[key]) {
                    const fname = `public/${Date.now()}_${f.name.replace(/[^\x00-\x7F]/g, "")}`;
                    await _supabase.storage.from('images').upload(fname, f);
                    imgUrls.push(_supabase.storage.from('images').getPublicUrl(fname).data.publicUrl);
                }

                const payload = { images: imgUrls, contact: document.getElementById(type[0].toLowerCase()+'_c').value };
                
                // 处理收款码上传
                if(type === 'Market' && localFiles.store_qr.length > 0) {
                    const qrFile = localFiles.store_qr[0];
                    const qrName = `qr/${Date.now()}_qr.png`;
                    await _supabase.storage.from('images').upload(qrName, qrFile);
                    payload.qr_url = _supabase.storage.from('images').getPublicUrl(qrName).data.publicUrl;
                }

                if(type === 'Market') { payload.name = document.getElementById('m_t').value; payload.price = document.getElementById('m_p').value; }
                else if(type === 'Carpool') { payload.route = document.getElementById('c_t').value; payload.time = document.getElementById('c_time').value; }
                else if(type === 'Job') { payload.title = document.getElementById('j_t').value; payload.pay = document.getElementById('j_p').value; payload.desc = document.getElementById('j_d').value; }
                
                const { data } = await _supabase.from(type).insert([payload]).select();
                const myPosts = JSON.parse(localStorage.getItem('my_posts') || '[]');
                myPosts.push(data[0].id);
                localStorage.setItem('my_posts', JSON.stringify(myPosts));
                alert("发布成功！"); location.reload();
            } catch (e) { alert("发布失败: " + e.message); btn.disabled = false; btn.innerText = "确认发布"; }
        }

        function handleImgs(input, preId, key) {
            // 如果是收款码，先清空之前的
            if(key === 'store_qr') {
                localFiles[key] = [];
                document.getElementById(preId).innerHTML = '';
            }
            Array.from(input.files).forEach(f => {
                localFiles[key].push(f);
                const reader = new FileReader();
                reader.onload = e => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `<img src="${e.target.result}"><div style="position:absolute;top:-5px;right:-5px;background:var(--danger);color:white;width:18px;height:18px;border-radius:50%;text-align:center;cursor:pointer;">×</div>`;
                    div.onclick = () => { div.remove(); localFiles[key] = localFiles[key].filter(file => file !== f); };
                    document.getElementById(preId).appendChild(div);
                };
                reader.readAsDataURL(f);
            });
        }

        async function load() {
            const { data: m } = await _supabase.from('Market').select('*').order('created_at', {ascending:false});
            const { data: c } = await _supabase.from('Carpool').select('*').order('created_at', {ascending:false});
            const { data: j } = await _supabase.from('Job').select('*').order('created_at', {ascending:false});
            globalData = { Market: m||[], Carpool: c||[], Job: j||[] };
            render('marketList', globalData.Market, 'Market');
            render('carpoolList', globalData.Carpool, 'Carpool');
            render('jobsList', globalData.Job, 'Job');
        }

        function render(id, list, type) {
            const container = document.getElementById(id);
            if(list.length === 0) { container.innerHTML = '<p style="color:#999; padding:20px;">暂无内容...</p>'; return; }
            container.innerHTML = list.map((item, index) => `
                <div class="card" onclick="showDetail('${type}', ${index})">
                    <img src="${(item.images&&item.images[0])||PLACEHOLDER}" class="card-img">
                    <div class="card-body">
                        ${type==='Market' ? `<div class="price">¥${item.price}</div><h4>${item.name}</h4>` : ''}
                        ${type==='Carpool' ? `<h4>${item.route}</h4><p>⏰ ${item.time}</p>` : ''}
                        ${type==='Job' ? `<div style="color:var(--secondary);font-weight:bold">${item.pay}</div><h4>${item.title}</h4>` : ''}
                    </div>
                </div>`).join('');
        }

        function viewImage(url) { document.getElementById('viewedImg').src = url; document.getElementById('imgViewer').style.display = 'flex'; }
        function switchSection(id) {
            document.querySelectorAll('.content-section, .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById(id + 'Section').classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); }

        window.onload = async () => { 
            await checkSession(); 
            await load(); 
            await verifyDeviceIP();
        };
    </script>
</body>
</html>
